<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 400 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0e1826; color: #c7d4e3; max-width: 560px; margin: 40px auto; padding: 0 20px;
      }
      h1 { font-size: 20px; color: #e6eef8; }
      h1 b { color: #5b9dff; }
      label { display: block; margin: 18px 0 6px; font-weight: 600; }
      input[type="text"] {
        width: 100%; box-sizing: border-box; padding: 9px 12px; border-radius: 8px;
        border: 1px solid #2a3a4d; background: #0a1420; color: #e6eef8;
      }
      .muted { color: #8b98a9; font-size: 12px; margin-top: 4px; }
      .row { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
      button {
        margin-top: 20px; padding: 9px 16px; border: 0; border-radius: 8px;
        background: #5b9dff; color: #06101d; font-weight: 700; cursor: pointer;
      }
      #saved { margin-left: 10px; color: #46d369; font-size: 13px; opacity: 0; transition: 0.2s; }
      #saved.show { opacity: 1; }
    </style>
  </head>
  <body>
    <h1>Stat<b>Run</b> settings</h1>

    <div class="row">
      <input type="checkbox" id="enabled" />
      <label for="enabled" style="margin: 0">Show CheatMeter badges on FACEIT &amp; Steam</label>
    </div>

    <label for="apiBase">StatRun site URL</label>
    <input type="text" id="apiBase" placeholder="https://steamcommunity.run" />
    <div class="muted">Where the extension reads stats from. Leave as the default unless you're testing a local build (e.g. http://localhost:3000).</div>

    <div>
      <button id="save">Save</button>
      <span id="saved">Saved ✓</span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
