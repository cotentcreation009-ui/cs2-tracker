# CS2 Tracker — full local stack.
#
#   docker compose up --build           # start postgres, redis, backend, worker, frontend
#   docker compose run --rm backend seed   # load demo data (synthetic matches)
#   docker compose logs -f worker       # follow the parser worker
#
# Frontend:  http://localhost:3000
# API:       http://localhost:8080/api/health
#
# Requires a healthy Docker engine. On Windows that means a working WSL2/Hyper-V
# backend — see the README if `docker compose up` fails to start the VM.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cs2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cs2}
      POSTGRES_DB: ${POSTGRES_DB:-cs2tracker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs2} -d ${POSTGRES_DB:-cs2tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: ["api"]
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-cs2}:${POSTGRES_PASSWORD:-cs2}@postgres:5432/${POSTGRES_DB:-cs2tracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      DEMO_QUEUE_KEY: cs2:demos:parse
      CACHE_TTL: 5m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: ./backend
    command: ["worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cs2}:${POSTGRES_PASSWORD:-cs2}@postgres:5432/${POSTGRES_DB:-cs2tracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DEMO_QUEUE_KEY: cs2:demos:parse
      DEMO_WORK_DIR: /tmp/cs2
      DELETE_RAW_DEMO: "true"
      JOB_TIMEOUT: 10m
    volumes:
      # Drop a .dem here and ingest it with demoPath=/demos/<file>.dem
      - ./testdata:/demos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
