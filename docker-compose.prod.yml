# Production single-box stack (GCE e2-small/medium, Hetzner CX22, any VPS).
# Only Caddy is exposed to the internet (80/443); Postgres, Redis, the Go backend
# and the Next.js frontend have NO published host ports — they talk over the
# internal Docker network only. Caddy terminates TLS (Cloudflare Origin cert) and
# reverse-proxies to the frontend. The demo-parsing worker is intentionally not
# run (parsing is dormant).
#
#   cp .env.example .env          # fill: POSTGRES_PASSWORD, STEAM_API_KEY, FACEIT_API_KEY, SITE_URL, DOMAIN
#   # place Cloudflare Origin cert as ./origin.pem and ./origin.key next to this file
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml run --rm backend seed   # optional demo data

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cs2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cs2tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs2} -d ${POSTGRES_DB:-cs2tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # no ports: internal Docker network only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # no ports: internal only (cache; no persistence needed)

  backend:
    build: ./backend
    command: ["api"]
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-cs2}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cs2tracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      FACEIT_API_KEY: ${FACEIT_API_KEY:-}
      FACEIT_BASE_URL: ${FACEIT_BASE_URL:-https://open.faceit.com/data/v4}
      LEETIFY_API_KEY: ${LEETIFY_API_KEY:-}
      # AI read (per-player verdict). Preferred: Vertex AI (Gemini), keyless via
      # the VM's service account — no separate bill, usage goes to the GCP
      # project. Needs the aiplatform.googleapis.com API enabled and the SA
      # granted roles/aiplatform.user. Project auto-detects from GCE metadata;
      # override with VERTEX_PROJECT if needed. ANTHROPIC_* is an optional fallback.
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      VERTEX_MODEL: ${VERTEX_MODEL:-gemini-2.0-flash-001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      EXTERNAL_CACHE_TTL: ${EXTERNAL_CACHE_TTL:-15m}
      CACHE_TTL: 5m
      CORS_ORIGINS: ${SITE_URL}
      # Locks the backend to the frontend: every route except /api/health requires
      # this token. Set the SAME value on the frontend below. (openssl rand -hex 32)
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      # Scratch dir for demo parsing — a container-local, writable path. The
      # service runs as a non-root user that can't write a root-owned named
      # volume, so we keep this on the container filesystem. The GCS path
      # downloads to the worker's own dir; the multipart fallback (only used when
      # GCS is unset) would need a shared writable volume.
      DEMO_WORK_DIR: /tmp/cs2demos
      # Direct (object-storage) upload. Set DEMO_GCS_BUCKET in .env to enable it;
      # signing uses the VM's attached service account (keyless) unless
      # DEMO_GCS_CREDENTIALS points at a mounted JSON key. See docs/demo-parsing.md.
      DEMO_GCS_BUCKET: ${DEMO_GCS_BUCKET:-}
      DEMO_GCS_CREDENTIALS: ${DEMO_GCS_CREDENTIALS:-}
      DEMO_MAX_MB: ${DEMO_MAX_MB:-600}
      DEMO_URL_TTL: ${DEMO_URL_TTL:-15m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # no ports: only the frontend (same network) calls it at http://backend:8080

  # Demo-analysis parse worker. Consumes user-uploaded demo jobs from Redis,
  # parses them server-side, stores the compact replay JSON, and deletes the raw
  # .dem. Bounded for a small box: one parse at a time, a soft Go memory target,
  # and a hard container cap so a pathological demo can only OOM this container
  # (its job fails and the worker restarts) — never the whole VM.
  worker:
    build: ./backend
    command: ["worker"]
    restart: unless-stopped
    # 8GB VM: give a single parse generous headroom (a big demo can need a few
    # GB). GOMEMLIMIT keeps Go GC'ing under the hard cap so one pathological demo
    # can only OOM this container, never the whole box.
    mem_limit: 5g
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cs2}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cs2tracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DEMO_WORK_DIR: /tmp/cs2demos
      DELETE_RAW_DEMO: "true"
      WORKER_CONCURRENCY: "1"
      JOB_TIMEOUT: 8m
      GOMEMLIMIT: 4096MiB
      # GCS direct-upload: the worker downloads the uploaded object to parse it,
      # then deletes it. Same bucket/creds as the backend.
      DEMO_GCS_BUCKET: ${DEMO_GCS_BUCKET:-}
      DEMO_GCS_CREDENTIALS: ${DEMO_GCS_CREDENTIALS:-}
      DEMO_MAX_MB: ${DEMO_MAX_MB:-600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:8080
      SITE_URL: ${SITE_URL:?set SITE_URL=https://yourdomain (no trailing slash) in .env}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
    depends_on:
      backend:
        condition: service_healthy
    # no ports: Caddy proxies to it at http://frontend:3000

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN=yourdomain (host only, no scheme) in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./origin.pem:/etc/caddy/origin.pem:ro
      - ./origin.key:/etc/caddy/origin.key:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
